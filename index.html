<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Étude — A Study in Your Skin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --cream: #f5f0e8;
    --cream-deep: #ede4d3;
    --ink: #2a2520;
    --ink-soft: #786a5e;
    --line: #d8cfbf;
    --sage: #8a9b7e;
    --rose: #c9a094;
  }
  * { font-family: 'Inter', sans-serif; }
  .font-serif { font-family: 'Cormorant Garamond', serif !important; font-weight: 500; }
  body { background: var(--cream); margin: 0; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-soft); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--ink); cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--ink); cursor: pointer; border: none;
  }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @keyframes slide {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .animate-slide { animation: slide 0.3s ease-out; }

  @keyframes pulse-soft {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .pulse-soft { animation: pulse-soft 1.6s ease-in-out infinite; }

  /* Input/select/textarea baseline styling */
  input, select, textarea {
    background: var(--cream-deep);
    border-color: var(--line);
    color: var(--ink);
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--ink) !important;
  }
  /* Primary button hover */
  .primary-btn:hover { background: var(--ink-soft) !important; }
  #loading-screen {
    position: fixed; inset: 0; background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div style="text-align:center;">
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:32px; color:var(--ink);">Étude</div>
    <div style="font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--ink-soft); margin-top:8px;">Loading…</div>
  </div>
</div>

<div id="root"></div>

<!-- API KEY MODAL — handled in React -->

<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef } = React;

// === ICON HELPER (uses lucide) ===
const Icon = ({ name, size = 16, className = '', ...props }) => {
  const ref = useRef();
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons.Circle);
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      ref.current.appendChild(svg);
    }
  }, [name, size]);
  return <span ref={ref} className={`inline-flex ${className}`} style={{ width: size, height: size }} {...props} />;
};

// === STABLE COMPONENTS (defined OUTSIDE App so they don't re-mount on every keystroke) ===
const inputCls = "w-full px-3 py-2.5 border rounded-md text-sm focus:outline-none transition font-light";
const primaryBtn = "w-full py-3 tracking-widest text-xs uppercase transition";

const Field = ({ label, children }) => (
  <div>
    <label className="block text-[10px] uppercase tracking-[0.15em] mb-2 font-medium" style={{color:'var(--ink-soft)'}}>{label}</label>
    {children}
  </div>
);

const Modal = ({ children, onClose, title }) => (
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(28,25,23,0.5)', backdropFilter:'blur(4px)'}} onClick={onClose}>
    <div onClick={e => e.stopPropagation()} className="rounded-lg max-w-xl w-full max-h-[90vh] overflow-y-auto shadow-2xl" style={{background:'var(--cream)'}}>
      <div className="sticky top-0 border-b px-6 py-4 flex justify-between items-center z-10" style={{background:'var(--cream)', borderColor:'var(--line)'}}>
        <h2 className="text-xl font-serif italic" style={{color:'var(--ink)'}}>{title}</h2>
        <button onClick={onClose} style={{color:'var(--ink-soft)'}}>
          <span style={{display:'inline-block', width:20, height:20}} dangerouslySetInnerHTML={{__html: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'}} />
        </button>
      </div>
      <div className="p-6">{children}</div>
    </div>
  </div>
);

// === LOCALSTORAGE HELPERS (replaces window.storage) ===
const storage = {
  get: async (key) => {
    const v = localStorage.getItem(`lumiere:${key}`);
    return v ? { value: v } : null;
  },
  set: async (key, value) => {
    localStorage.setItem(`lumiere:${key}`, value);
    return { value };
  },
  delete: async (key) => {
    localStorage.removeItem(`lumiere:${key}`);
    return { deleted: true };
  }
};

// === API KEY MANAGEMENT ===
const getApiKey = () => localStorage.getItem('lumiere:apiKey') || '';
const setApiKey = (k) => localStorage.setItem('lumiere:apiKey', k);

function App() {
  const [user, setUser] = useState(null);
  const [authMode, setAuthMode] = useState('signin');
  const [authForm, setAuthForm] = useState({ email: '', password: '', name: '' });
  const [authError, setAuthError] = useState('');
  const [loading, setLoading] = useState(true);

  const [activeTab, setActiveTab] = useState('dashboard');
  const [logs, setLogs] = useState([]);
  const [products, setProducts] = useState([]);
  const [procedures, setProcedures] = useState([]);
  const [events, setEvents] = useState([]);
  const [colorProfile, setColorProfile] = useState(null);
  const [cycleData, setCycleData] = useState({ periods: [], cycleLength: 28 });
  const [toasts, setToasts] = useState([]);
  const [patternInsight, setPatternInsight] = useState(null);
  const [loadingPattern, setLoadingPattern] = useState(false);

  // Toast helper
  const toast = (msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4500);
  };

  // Cmd/Ctrl + K to open search
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setShowSearch(true);
      }
      if (e.key === 'Escape') {
        setShowSearch(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const [showLogModal, setShowLogModal] = useState(false);
  const [showProductModal, setShowProductModal] = useState(false);
  const [showProcedureModal, setShowProcedureModal] = useState(false);
  const [showEventModal, setShowEventModal] = useState(false);
  const [showColorModal, setShowColorModal] = useState(false);
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);
  const [showMobileMenu, setShowMobileMenu] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [apiKey, setApiKeyState] = useState(getApiKey());

  const [insightQuery, setInsightQuery] = useState('');
  const [insightResponse, setInsightResponse] = useState('');
  const [insightLoading, setInsightLoading] = useState(false);
  const [makeupQuery, setMakeupQuery] = useState('');
  const [makeupResponse, setMakeupResponse] = useState('');
  const [makeupLoading, setMakeupLoading] = useState(false);
  const [productAssessment, setProductAssessment] = useState({});
  const [assessingProduct, setAssessingProduct] = useState(null);

  const [compareA, setCompareA] = useState(null);
  const [compareB, setCompareB] = useState(null);

  useEffect(() => {
    const loadSession = async () => {
      try {
        const session = await storage.get('session');
        if (session?.value) {
          const sessionData = JSON.parse(session.value);
          setUser(sessionData);
          await loadAllData(sessionData.email);
        }
      } catch (e) {}
      setLoading(false);
      const ls = document.getElementById('loading-screen');
      if (ls) ls.style.display = 'none';
    };
    loadSession();
  }, []);

  const loadAllData = async (email) => {
    const userKey = email.replace(/[^a-zA-Z0-9]/g, '');
    try {
      const [l, p, pr, e, c, pi, cy] = await Promise.all([
        storage.get(`logs:${userKey}`).catch(() => null),
        storage.get(`products:${userKey}`).catch(() => null),
        storage.get(`procedures:${userKey}`).catch(() => null),
        storage.get(`events:${userKey}`).catch(() => null),
        storage.get(`color:${userKey}`).catch(() => null),
        storage.get(`pattern:${userKey}`).catch(() => null),
        storage.get(`cycle:${userKey}`).catch(() => null),
      ]);
      setLogs(l?.value ? JSON.parse(l.value) : []);
      setProducts(p?.value ? JSON.parse(p.value) : []);
      setProcedures(pr?.value ? JSON.parse(pr.value) : []);
      setEvents(e?.value ? JSON.parse(e.value) : []);
      setColorProfile(c?.value ? JSON.parse(c.value) : null);
      setPatternInsight(pi?.value ? JSON.parse(pi.value) : null);
      setCycleData(cy?.value ? JSON.parse(cy.value) : { periods: [], cycleLength: 28 });
    } catch (err) { console.error(err); }
  };

  const saveData = async (key, data) => {
    if (!user) return;
    const userKey = user.email.replace(/[^a-zA-Z0-9]/g, '');
    try {
      await storage.set(`${key}:${userKey}`, JSON.stringify(data));
    } catch (e) {
      alert('Storage full or unavailable. Try removing some old photos.');
    }
  };

  const handleAuth = async (e) => {
    e.preventDefault();
    setAuthError('');
    if (!authForm.email || !authForm.password) { setAuthError('Please fill in all fields'); return; }
    if (authMode === 'signup' && !authForm.name) { setAuthError('Please enter your name'); return; }

    const userKey = authForm.email.replace(/[^a-zA-Z0-9]/g, '');
    try {
      const existing = await storage.get(`user:${userKey}`).catch(() => null);
      if (authMode === 'signup') {
        if (existing?.value) { setAuthError('An account with this email already exists'); return; }
        const newUser = { email: authForm.email, name: authForm.name, password: authForm.password, createdAt: Date.now() };
        await storage.set(`user:${userKey}`, JSON.stringify(newUser));
        const session = { email: authForm.email, name: authForm.name };
        await storage.set('session', JSON.stringify(session));
        setUser(session);
        await loadAllData(authForm.email);
      } else {
        if (!existing?.value) { setAuthError('No account found. Please sign up.'); return; }
        const userData = JSON.parse(existing.value);
        if (userData.password !== authForm.password) { setAuthError('Incorrect password'); return; }
        const session = { email: userData.email, name: userData.name };
        await storage.set('session', JSON.stringify(session));
        setUser(session);
        await loadAllData(userData.email);
      }
    } catch (err) {
      setAuthError('Something went wrong. Please try again.');
    }
  };

  const handleSignOut = async () => {
    try { await storage.delete('session'); } catch (e) {}
    setUser(null);
    setLogs([]); setProducts([]); setProcedures([]); setEvents([]); setColorProfile(null); setPatternInsight(null); setCycleData({ periods: [], cycleLength: 28 });
    setAuthForm({ email: '', password: '', name: '' });
  };

  const fileToBase64 = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxDim = 800;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = h * (maxDim / w); w = maxDim; }
          else { w = w * (maxDim / h); h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  // === CLAUDE API CALL (uses user-provided key, supports vision) ===
  const callClaude = async (prompt, systemContext = '', imageBase64 = null) => {
    const key = getApiKey();
    if (!key) {
      setShowApiKeyModal(true);
      throw new Error('API key required');
    }
    // Build message content — include image if provided
    let content;
    if (imageBase64) {
      // strip data URL prefix
      const cleanB64 = imageBase64.replace(/^data:image\/\w+;base64,/, '');
      content = [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: cleanB64 } },
        { type: "text", text: prompt }
      ];
    } else {
      content = prompt;
    }
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system: systemContext || "You are a board-certified dermatologist and skincare expert who only gives evidence-based advice grounded in peer-reviewed research and recommendations from leading dermatologists (such as those at the AAD). When recommending products, only suggest those with proven active ingredients (retinoids, vitamin C, niacinamide, AHAs/BHAs, peptides, ceramides, hyaluronic acid, sunscreens, etc.) backed by clinical studies. Cite mechanisms of action where relevant. Be warm but precise. Use clean prose with light structure — short paragraphs, sparing use of bold for key terms.",
        messages: [{ role: "user", content }],
      })
    });
    if (!response.ok) {
      const err = await response.text();
      throw new Error(`API error: ${err}`);
    }
    const data = await response.json();
    return data.content.map(i => i.type === 'text' ? i.text : '').join('\n');
  };

  // === LOG MODAL ===
  const SkinLogModal = () => {
    const [form, setForm] = useState({
      date: new Date().toISOString().split('T')[0],
      area: 'full-face', rating: 5, notes: '', concerns: [], photo: null,
    });
    const fileRef = useRef();
    const concernOptions = ['Acne', 'Redness', 'Dryness', 'Oiliness', 'Texture', 'Dark Spots', 'Fine Lines', 'Dullness', 'Sensitivity', 'Breakout'];

    const handlePhoto = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const b64 = await fileToBase64(file);
      setForm({ ...form, photo: b64 });
    };

    const handleSubmit = async () => {
      const id = Date.now();
      const newLog = { ...form, id, aiAnalysis: null, analyzing: getApiKey() ? true : false };
      const updated = [...logs, newLog].sort((a, b) => new Date(b.date) - new Date(a.date));
      setLogs(updated);
      await saveData('logs', updated);
      setShowLogModal(false);
      // Run AI in background
      if (getApiKey()) {
        toast('Entry saved — analyzing in the background…', 'info');
        (async () => {
          try {
            const recentContext = logs.slice(0, 5).map(l => `${l.date}: ${l.area} ${l.rating}/10 [${l.concerns?.join(',') || ''}]`).join('; ') || 'no prior entries';
            const activeProducts = products.filter(p => !p.endDate).map(p => `${p.name} (${p.activeIngredients || 'no actives listed'})`).join(', ') || 'none';
            const prompt = `Analyze this skin journal entry and give a concise evidence-based observation (3-5 sentences). Note any patterns vs prior entries, possible causes for the concerns listed, and one specific actionable suggestion.

Today's entry:
- Date: ${form.date}
- Area: ${form.area}
- Rating: ${form.rating}/10
- Concerns: ${form.concerns?.join(', ') || 'none'}
- Notes: ${form.notes || 'none'}
${form.photo ? '- Photo provided (analyze visible skin condition if relevant)' : ''}

Recent context: ${recentContext}
Current active routine: ${activeProducts}`;
            const aiAnalysis = await callClaude(prompt, '', form.photo);
            setLogs(prev => {
              const next = prev.map(l => l.id === id ? { ...l, aiAnalysis, analyzing: false } : l);
              saveData('logs', next);
              return next;
            });
            toast('Journal observation ready ✨');
          } catch (e) {
            setLogs(prev => {
              const next = prev.map(l => l.id === id ? { ...l, analyzing: false } : l);
              saveData('logs', next);
              return next;
            });
          }
        })();
      }
    };

    return (
      <Modal onClose={() => setShowLogModal(false)} title="Log Today's Skin">
        <div className="space-y-5">
          <div className="grid grid-cols-2 gap-4">
            <Field label="Date">
              <input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} className={inputCls} />
            </Field>
            <Field label="Area">
              <select value={form.area} onChange={e => setForm({ ...form, area: e.target.value })} className={inputCls}>
                <option value="full-face">Full Face</option>
                <option value="forehead">Forehead</option>
                <option value="cheeks">Cheeks</option>
                <option value="chin">Chin</option>
                <option value="nose-tzone">Nose / T-Zone</option>
                <option value="neck">Neck</option>
                <option value="body">Body</option>
                <option value="back">Back</option>
              </select>
            </Field>
          </div>
          <Field label={`Rating: ${form.rating}/10`}>
            <input type="range" min="1" max="10" value={form.rating} onChange={e => setForm({ ...form, rating: +e.target.value })} className="w-full" />
            <div className="flex justify-between text-xs mt-1" style={{color:'var(--ink-soft)'}}>
              <span>Rough day</span><span>Glowing</span>
            </div>
          </Field>
          <Field label="Concerns">
            <div className="flex flex-wrap gap-2">
              {concernOptions.map(c => (
                <button key={c} type="button" onClick={() => {
                  const set = form.concerns.includes(c) ? form.concerns.filter(x => x !== c) : [...form.concerns, c];
                  setForm({ ...form, concerns: set });
                }} className="px-3 py-1.5 text-xs tracking-wide rounded-full border transition" style={{
                  background: form.concerns.includes(c) ? 'var(--ink)' : 'transparent',
                  color: form.concerns.includes(c) ? 'var(--cream)' : 'var(--ink-soft)',
                  borderColor: form.concerns.includes(c) ? 'var(--ink)' : 'var(--line)'
                }}>{c}</button>
              ))}
            </div>
          </Field>
          <Field label="Notes">
            <textarea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} placeholder="How does your skin feel today?" rows="3" className={inputCls} />
          </Field>
          <Field label="Photo">
            {form.photo ? (
              <div className="relative">
                <img src={form.photo} alt="" className="w-full h-48 object-cover rounded-md" />
                <button onClick={() => setForm({ ...form, photo: null })} className="absolute top-2 right-2 p-1.5 rounded-full" style={{background:'var(--ink)', color:'var(--cream)'}}>
                  <Icon name="X" size={14} />
                </button>
              </div>
            ) : (
              <div className="flex gap-3">
                <button type="button" onClick={() => { fileRef.current?.removeAttribute('capture'); fileRef.current?.click(); }} className="flex-1 border border-dashed rounded-md py-6 flex flex-col items-center gap-2 transition" style={{borderColor:'var(--line)', color:'var(--ink-soft)'}}>
                  <Icon name="Upload" size={20} />
                  <span className="text-xs tracking-widest uppercase">Upload Photo</span>
                </button>
                <button type="button" onClick={() => { fileRef.current?.setAttribute('capture', 'user'); fileRef.current?.click(); }} className="flex-1 border border-dashed rounded-md py-6 flex flex-col items-center gap-2 transition" style={{borderColor:'var(--line)', color:'var(--ink-soft)'}}>
                  <Icon name="Camera" size={20} />
                  <span className="text-xs tracking-widest uppercase">Take Photo</span>
                </button>
                <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} className="hidden" />
              </div>
            )}
          </Field>
          <button onClick={handleSubmit} className={primaryBtn} style={{background:'var(--ink)', color:'var(--cream)'}}>
            Save Entry
          </button>
        </div>
      </Modal>
    );
  };

  // === PRODUCT MODAL ===
  const ProductModal = () => {
    const [form, setForm] = useState({
      name: '', brand: '', category: 'serum', startDate: new Date().toISOString().split('T')[0],
      endDate: '', activeIngredients: '', frequency: 'daily', notes: '', photo: null, status: 'active'
    });
    const fileRef = useRef();
    const handlePhoto = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const b64 = await fileToBase64(file);
      setForm({ ...form, photo: b64 });
    };
    const handleSubmit = async () => {
      if (!form.name && !form.photo) return;
      const id = Date.now();
      const tempProduct = { ...form, name: form.name || 'Identifying…', id, aiAnalysis: null, analyzing: getApiKey() ? true : false };
      const updated = [tempProduct, ...products];
      setProducts(updated);
      await saveData('products', updated);
      setShowProductModal(false);
      if (getApiKey()) {
        toast(form.photo ? 'Reading label & analyzing in background…' : 'Looking up product in background…', 'info');
        (async () => {
          try {
            const otherActives = products.filter(p => !p.endDate).map(p => `${p.name}: ${p.activeIngredients || 'unknown'}`).join('; ') || 'none';
            const visionInstruction = form.photo ? 'A product photo is attached. Read the bottle/label to identify the product name, brand, and full active ingredient list. Use this to override the user input below if it conflicts with what you see on the label.' : '';
            const prompt = `${visionInstruction}

User-provided info:
- Product: ${form.name || '(unknown — read from photo)'}
- Brand: ${form.brand || '(unknown — read from photo)'}
- Category: ${form.category}
- Active ingredients: ${form.activeIngredients || '(not specified — look up or read from label)'}
- Frequency: ${form.frequency}
- User notes: ${form.notes || 'none'}

User's other active products: ${otherActives}

Provide a comprehensive evidence-based assessment in this exact format:

DETECTED_NAME: [product name as best identified]
DETECTED_BRAND: [brand as best identified]
DETECTED_ACTIVES: [comma-separated list of active ingredients with concentrations if known]

ASSESSMENT:
[A 4-6 sentence evidence-based analysis covering: what the actives do (mechanism), strength of clinical evidence, what skin concerns it best addresses, ideal placement in routine, and one specific pro tip for this product.]

CONFLICTS:

                  {[
                    {q:'acne', icon:'AlertCircle'}, {q:'retinol', icon:'Beaker'},
                    {q:'microneedling', icon:'Activity'}, {q:'forehead', icon:'User'}
                  ].map(s => (
                    <button key={s.q} onClick={() => setSearchQuery(s.q)} className="text-[10px] tracking-[0.15em] uppercase border p-2 transition" style={{borderColor:'var(--line)', color:'var(--ink-soft)'}}>{s.q}</button>
                  ))}
                </div>
              </div>
            )}
            {q && matches.length === 0 && (
              <div className="p-8 text-center font-light italic text-sm" style={{color:'var(--ink-soft)'}}>No matches found.</div>
            )}
            {matches.map((m, i) => (
              <button key={`${m._type}-${m.id}`} onClick={() => goToTab(m._type)} className="w-full px-5 py-3 flex items-center gap-3 text-left transition border-b hover:opacity-80" style={{borderColor:'var(--line)'}}>
                <div className="w-8 h-8 rounded-sm flex items-center justify-center flex-shrink-0" style={{background:'var(--cream-deep)', color:'var(--ink)'}}>
                  <Icon name={m._icon} size={14} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-serif italic text-base truncate" style={{color:'var(--ink)'}}>{m.name || m.notes?.slice(0, 60) || `${m.area} entry`}</div>
                  <div className="text-[10px] tracking-[0.15em] uppercase mt-0.5 truncate" style={{color:'var(--ink-soft)'}}>{m._type} · {m._label}</div>

          </div>
          <div className="px-5 py-2 text-[9px] tracking-[0.2em] uppercase border-t flex justify-between" style={{borderColor:'var(--line)', color:'var(--ink-soft)'}}>
            <span>{matches.length} results</span>
            <span>⌘K to open · ESC to close</span>

        </div>

  };

  // === HANDLERS ===
  const handleInsight = async () => {
    if (!insightQuery.trim()) return;
    if (!getApiKey()) { setShowApiKeyModal(true); return; }
    setInsightLoading(true);
    setInsightResponse('');
    try {
      const skinHistory = logs.slice(0, 30).map(l => `${l.date} | ${l.area} | ${l.rating}/10 | ${l.concerns?.join(',') || '-'} | ${l.notes || ''}`).join('\n');
      const productList = products.map(p => `${p.name} by ${p.brand} (${p.category}) — actives: ${p.activeIngredients || 'none'} — used ${p.startDate} to ${p.endDate || 'present'} (${p.frequency})`).join('\n');
      const procList = procedures.map(p => `${p.date}: ${p.name} (${p.type}) — results: ${p.results || 'n/a'}`).join('\n');
      const cycleContext = cycleData?.periods?.length ? `\n\nCycle data: Last period started ${cycleData.periods[0].date}. Cycle length: ${cycleData.cycleLength || 28} days. Recent periods: ${cycleData.periods.slice(0, 5).map(p => p.date).join(', ')}.` : '';
      const context = `User's skin journal (most recent first):\n${skinHistory || 'No entries yet.'}\n\nProducts:\n${productList || 'None.'}\n\nProcedures:\n${procList || 'None.'}${cycleContext}`;
      const prompt = `Based on this user's tracked skin data, answer their question:\n\n${context}\n\nQuestion: ${insightQuery}\n\nGive evidence-based advice. Reference patterns you see in their data. Cite ingredients/research when relevant. If cycle data is available and relevant to the question, factor in hormonal phase.`;
      const result = await callClaude(prompt);
      setInsightResponse(result);
    } catch (e) {
      if (!e.message.includes('API key')) setInsightResponse('Unable to generate response. Check your API key and try again.');
    }
    setInsightLoading(false);
  };

  const handleMakeup = async () => {
    if (!makeupQuery.trim()) return;
    if (!getApiKey()) { setShowApiKeyModal(true); return; }
    setMakeupLoading(true);
    setMakeupResponse('');
    try {
      const colorContext = colorProfile ? `Season: ${colorProfile.season || 'unknown'}, Skin tone: ${colorProfile.skinTone}, Undertone: ${colorProfile.undertone}, Eye: ${colorProfile.eyeColor}, Hair: ${colorProfile.hairColor}` : 'No color analysis on file.';
      const prompt = `Color profile: ${colorContext}\n\nMakeup request: ${makeupQuery}\n\nRecommend specific shades, finishes, and product types that align with their color analysis. Suggest specific drugstore and high-end products where helpful. Be concrete about hex/color families.`;
      const result = await callClaude(prompt, "You are a professional makeup artist trained in seasonal color analysis (12-season system). Give evidence-based, specific recommendations.");
      setMakeupResponse(result);
    } catch (e) {
      if (!e.message.includes('API key')) setMakeupResponse('Unable to generate response.');
    }
    setMakeupLoading(false);
  };

  const assessProduct = async (product) => {
    if (!getApiKey()) { setShowApiKeyModal(true); return; }
    setAssessingProduct(product.id);
    try {
      const otherActives = products.filter(p => !p.endDate && p.id !== product.id).map(p => `${p.name}: ${p.activeIngredients || 'unknown'}`).join('; ') || 'none';
      const prompt = `Provide a comprehensive evidence-based assessment of this product:

Product: ${product.name} by ${product.brand}
Category: ${product.category}
Active Ingredients: ${product.activeIngredients || 'not listed — please identify based on product name'}
Frequency: ${product.frequency}
User notes: ${product.notes}

User's other active products: ${otherActives}

ASSESSMENT:
[A 4-6 sentence evidence-based analysis covering: what the actives do (mechanism), strength of clinical evidence, what skin concerns it best addresses, ideal placement in routine, and one specific pro tip.]

CONFLICTS:
[List any interaction or layering concerns with the user's other active products. If none, write "No major conflicts detected."]`;
      const result = await callClaude(prompt);
      setProductAssessment({...productAssessment, [product.id]: result});
      // Also persist to the product itself
      const updated = products.map(p => p.id === product.id ? { ...p, aiAnalysis: result } : p);
      setProducts(updated);
      await saveData('products', updated);
    } catch (e) {
      if (!e.message.includes('API key')) setProductAssessment({...productAssessment, [product.id]: 'Unable to assess. Try again.'});
    }
    setAssessingProduct(null);
  };

  const deleteLog = async (id) => { const u = logs.filter(l => l.id !== id); setLogs(u); await saveData('logs', u); };
  const deleteProduct = async (id) => { const u = products.filter(p => p.id !== id); setProducts(u); await saveData('products', u); };
  const deleteProcedure = async (id) => { const u = procedures.filter(p => p.id !== id); setProcedures(u); await saveData('procedures', u); };
  const deleteEvent = async (id) => { const u = events.filter(e => e.id !== id); setEvents(u); await saveData('events', u); };

  // === STYLES (inline tag substitutions) ===
  const styledInput = { background: 'var(--cream-deep)', borderColor: 'var(--line)', color: 'var(--ink)' };
  const styledPrimaryBtn = { background: 'var(--ink)', color: 'var(--cream)' };

  // === STATS ===
  const avgRating = logs.length ? (logs.reduce((s, l) => s + +l.rating, 0) / logs.length).toFixed(1) : '—';
  const recent7 = logs.slice(0, 7);
  const recent7Avg = recent7.length ? (recent7.reduce((s, l) => s + +l.rating, 0) / recent7.length).toFixed(1) : '—';
  const trend = logs.length >= 14 ? (() => {
    const last7 = logs.slice(0, 7).reduce((s, l) => s + +l.rating, 0) / 7;
    const prev7 = logs.slice(7, 14).reduce((s, l) => s + +l.rating, 0) / 7;
    return (last7 - prev7).toFixed(1);
  })() : null;

  // Streak calculation: consecutive days with at least one entry, working backward from today
  const calcStreak = () => {
    if (!logs.length) return 0;
    const dates = new Set(logs.map(l => l.date));
    let streak = 0;
    let d = new Date();
    while (dates.has(d.toISOString().split('T')[0])) {
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  };
  const streak = calcStreak();
  const todayStr = new Date().toISOString().split('T')[0];
  const loggedToday = logs.some(l => l.date === todayStr);

  // === PATTERN DETECTION ===
  const generatePatternInsight = async () => {
    if (!getApiKey()) { setShowApiKeyModal(true); return; }
    setLoadingPattern(true);
    try {
      const recent = logs.slice(0, 30).map(l => `${l.date} | ${l.area} | ${l.rating}/10 | ${l.concerns?.join(',') || '-'} | ${l.notes || ''}`).join('\n');
      const productTimeline = products.map(p => `${p.name} (${p.activeIngredients || 'no actives'}) - started ${p.startDate}${p.endDate ? `, stopped ${p.endDate}` : ''}`).join('\n');
      const procTimeline = procedures.map(p => `${p.date}: ${p.name}`).join('; ');
      const prompt = `Analyze this person's skin tracking data and identify 3-4 meaningful patterns. Look for:
- Correlations between products started/stopped and skin scores
- Concern patterns (does acne flare in specific areas? cyclically?)
- Procedure impact on subsequent ratings
- Any notable upward/downward trends
- Possible triggers based on noted concerns

Recent journal entries:
${recent}

Product timeline:
${productTimeline || 'No products logged'}

Procedure timeline:
${procTimeline || 'No procedures logged'}

Format as 3-4 distinct observations, each starting with a bold pattern name and a sentence of evidence-based interpretation. Be specific (cite dates, scores, products) — not generic. End with one concrete suggestion based on the strongest pattern.`;
      const result = await callClaude(prompt);
      const insight = { content: result, generatedAt: Date.now(), entryCount: logs.length };
      setPatternInsight(insight);
      const userKey = user.email.replace(/[^a-zA-Z0-9]/g, '');
      await storage.set(`pattern:${userKey}`, JSON.stringify(insight));
      toast('Pattern analysis complete ✨');
    } catch (e) {
      toast('Pattern analysis failed', 'error');
    }
    setLoadingPattern(false);

        @media print { body { background: white; } }
      </style>
    `;
    const journalSection = logs.slice(0, 50).map(l => `
      <div class="entry">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>

      </div>
    `).join('');
    const productSection = products.map(p => `
      <div class="entry">
        <div class="meta">${p.brand || 'Unknown'} · ${p.category}</div>
        <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px;">${p.name}</div>
        <div style="font-size:12px; color:#786a5e;">${p.activeIngredients || 'No actives listed'} · ${p.frequency.replace(/-/g, ' ')} · ${p.startDate}${p.endDate ? ` to ${p.endDate}` : ' to present'}</div>
        ${p.aiAnalysis ? `<div class="observation">${p.aiAnalysis}</div>` : ''}
      </div>
    `).join('');
    const procSection = procedures.map(p => `
      <div class="entry">
        <div class="meta">${p.type.replace(/-/g, ' ')} · ${new Date(p.date).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })}</div>
        <h3>${p.name}</h3>
        ${p.provider ? `<div style="font-size:12px; color:#786a5e;">Provider: ${p.provider}${p.cost ? ` · ${p.cost}` : ''}</div>` : ''}
        ${p.notes ? `<div style="font-size:13px; margin-top:4px;">${p.notes}</div>` : ''}
        ${p.results ? `<div style="font-size:13px; font-style:italic; margin-top:4px;"><strong>Results:</strong> ${p.results}</div>` : ''}

    `).join('');
    w.document.write(`

      ${patternInsight ? `<div style="margin:24px 0; padding:16px; background:#ede4d3; border-left:3px solid #2a2520;"><div class="meta">Pattern Analysis</div><div style="margin-top:8px; white-space:pre-wrap; font-size:13px;">${patternInsight.content}</div></div>` : ''}
      ${logs.length ? `<h2>Journal Entries</h2>${journalSection}` : ''}

  if (loading) return null;

  // === AUTH SCREEN ===

          <div className="relative z-10 flex flex-col justify-between p-12 w-full" style={{color:'var(--cream)'}}>
            <div>
              <div className="text-xs tracking-[0.3em] uppercase opacity-70 mb-2">Est. 2026</div>
              <div className="font-serif text-2xl italic">Étude</div>
            </div>
            <div>
              <h1 className="font-serif text-5xl leading-tight italic mb-4">A study in your skin.</h1>

              <div className="flex gap-6 mt-12 text-[10px] tracking-[0.2em] uppercase opacity-60">

        <div className="flex-1 flex items-center justify-center p-8">

            <h2 className="font-serif text-3xl italic mb-2" style={{color:'var(--ink)'}}>{authMode === 'signin' ? 'Welcome back.' : 'Begin your study.'}</h2>

            <form onSubmit={handleAuth} className="space-y-5">
              {authMode === 'signup' && (
                <Field label="Name"><input type="text" value={authForm.name} onChange={e => setAuthForm({...authForm, name: e.target.value})} className={inputCls} style={styledInput} /></Field>
              )}
              <Field label="Email"><input type="email" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} className={inputCls} style={styledInput} /></Field>
              <Field label="Password"><input type="password" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className={inputCls} style={styledInput} /></Field>

              {authError && <div className="text-xs flex items-center gap-2" style={{color:'#a13030'}}><Icon name="AlertCircle" size={12} />{authError}</div>}

              <button type="submit" className={primaryBtn} style={styledPrimaryBtn}>{authMode === 'signin' ? 'Sign In' : 'Create Account'}</button>

              {authMode === 'signin' ? "New here? " : "Have an account? "}

              Your data lives privately on this device

  }

  // === MAIN APP ===
  const tabs = [
    { id: 'dashboard', label: 'Atelier', icon: 'Heart' },
    { id: 'journal', label: 'Journal', icon: 'Calendar' },
    { id: 'timeline', label: 'Timeline', icon: 'LayoutGrid' },
    { id: 'products', label: 'Shelf', icon: 'Package' },
    { id: 'routine', label: 'Routine', icon: 'Layers' },
    { id: 'procedures', label: 'Procedures', icon: 'Activity' },
    { id: 'cycle', label: 'Cycle', icon: 'Moon' },
    { id: 'events', label: 'Occasions', icon: 'Star' },
    { id: 'compare', label: 'Compare', icon: 'Eye' },

  return (

        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
          <div className="flex items-center gap-8">
            <div>
              <div className="text-[9px] tracking-[0.3em] uppercase" style={{color:'var(--ink-soft)'}}>Est. 2026</div>
              <div className="font-serif text-xl italic leading-none" style={{color:'var(--ink)'}}>Étude</div>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={() => setShowSearch(true)} className="p-2 transition" style={{color:'var(--ink-soft)'}} title="Search (⌘K)">
              <Icon name="Search" size={14} />
            </button>
            <button onClick={() => setShowApiKeyModal(true)} className="p-2 transition" style={{color: apiKey ? 'var(--sage)' : 'var(--ink-soft)'}} title={apiKey ? 'API key set' : 'Set API key for AI features'}>
              <Icon name="Key" size={14} />
            </button>
            <div className="text-right hidden sm:block">
              <div className="text-[9px] tracking-[0.2em] uppercase" style={{color:'var(--ink-soft)'}}>Logged in as</div>
              <div className="text-sm font-serif italic" style={{color:'var(--ink)'}}>{user.name}</div>

            <button onClick={handleSignOut} className="p-2 transition" style={{color:'var(--ink-soft)'}} title="Sign out"><Icon name="LogOut" size={16} /></button>
          </div>
        </div>

        <div className="max-w-7xl mx-auto px-6 overflow-x-auto hidden md:block">
          <div className="flex gap-1 -mb-px">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} className="flex items-center gap-2 px-4 py-3 text-[11px] tracking-[0.15em] uppercase whitespace-nowrap border-b-2 transition" style={{
                borderBottomColor: activeTab === t.id ? 'var(--ink)' : 'transparent',
                color: activeTab === t.id ? 'var(--ink)' : 'var(--ink-soft)'
              }}>
                <Icon name={t.icon} size={13} />
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-10 pb-32 md:pb-10">

        {activeTab === 'dashboard' && (
          <div className="space-y-12">

              <div>
                <div className="text-[10px] tracking-[0.3em] uppercase mb-2" style={{color:'var(--ink-soft)'}}>Volume I — {new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</div>
                <h1 className="font-serif text-5xl italic" style={{color:'var(--ink)'}}>Good morning, {user.name.split(' ')[0]}.</h1>

              <button onClick={() => setShowLogModal(true)} className="px-6 py-3 tracking-[0.2em] text-[10px] uppercase transition flex items-center gap-2" style={{background:'var(--ink)', color:'var(--cream)'}}>

            {!loggedToday && logs.length > 0 && (
              <div className="border p-5 flex items-center justify-between gap-4 flex-wrap" style={{background:'var(--cream-deep)', borderColor:'var(--line)'}}>
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style={{background:'var(--cream)', color:'var(--ink)'}}>
                    <Icon name="Calendar" size={16} />

                  <div>
                    <div className="font-serif italic text-lg" style={{color:'var(--ink)'}}>You haven't logged today.</div>
                    <div className="text-xs font-light" style={{color:'var(--ink-soft)'}}>{streak > 0 ? `Don't break your ${streak}-day ritual.` : 'Pick up where you left off.'}</div>

const CompareAnalysis = ({ a, b, products, procedures, callClaude, setShowApiKeyModal }) => {
  const [analysis, setAnalysis] = useState('');
  const [loading, setLoading] = useState(false);

  const analyze = async () => {
    if (!getApiKey()) { setShowApiKeyModal(true); return; }
    setLoading(true);
    try {
      // Determine which is earlier (before) and later (after)
      const earlier = new Date(a.date) < new Date(b.date) ? a : b;
      const later = earlier === a ? b : a;
      const days = Math.abs(Math.ceil((new Date(later.date) - new Date(earlier.date)) / (1000 * 60 * 60 * 24)));

      // Find products started during the gap
      const productsStartedBetween = products.filter(p => {
        const ps = new Date(p.startDate);
        return ps >= new Date(earlier.date) && ps <= new Date(later.date);
      }).map(p => `${p.name} (${p.activeIngredients || 'no actives listed'}) — started ${p.startDate}`);

      const proceduresBetween = procedures.filter(p => {
        const pd = new Date(p.date);
        return pd >= new Date(earlier.date) && pd <= new Date(later.date);
      }).map(p => `${p.name} on ${p.date}`);

      const prompt = `Compare these two skin journal entries from the same person, ${days} days apart. Note specific visible differences, possible causes, and what's working or not.

BEFORE (${earlier.date}, ${earlier.area}, rated ${earlier.rating}/10):
- Concerns: ${earlier.concerns?.join(', ') || 'none'}
- Notes: ${earlier.notes || 'none'}

AFTER (${later.date}, ${later.area}, rated ${later.rating}/10):
- Concerns: ${later.concerns?.join(', ') || 'none'}
- Notes: ${later.notes || 'none'}

Products added in this window: ${productsStartedBetween.length ? productsStartedBetween.join('; ') : 'none'}
Procedures during this window: ${proceduresBetween.length ? proceduresBetween.join('; ') : 'none'}

${(earlier.photo && later.photo) ? 'Two photos are provided. Describe the visible differences in skin texture, redness, blemishes, hydration, and overall complexion.' : ''}

Format response as 3 short sections:
WHAT CHANGED: [specific visible/reported differences]
LIKELY DRIVERS: [what factors likely contributed — products, procedures, or other patterns]
NEXT STEPS: [one or two specific evidence-based suggestions]`;

      // If both have photos, send them both
      let result;
      if (earlier.photo && later.photo) {
        // Use a multi-image call
        const key = getApiKey();
        const before64 = earlier.photo.replace(/^data:image\/\w+;base64,/, '');
        const after64 = later.photo.replace(/^data:image\/\w+;base64,/, '');
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1500,
            system: "You are a board-certified dermatologist comparing two photos of the same person's skin. Be specific and evidence-based.",
            messages: [{ role: "user", content: [
              { type: "text", text: "BEFORE photo:" },
              { type: "image", source: { type: "base64", media_type: "image/jpeg", data: before64 } },
              { type: "text", text: "AFTER photo:" },
              { type: "image", source: { type: "base64", media_type: "image/jpeg", data: after64 } },
              { type: "text", text: prompt }
            ]}]
          })
        });
        const data = await response.json();
        result = data.content.map(i => i.type === 'text' ? i.text : '').join('\n');
      } else {
        result = await callClaude(prompt);
      }
      setAnalysis(result);
    } catch (e) {
      setAnalysis('Unable to analyze. Try again.');
    }
    setLoading(false);
  };

  return (
    <div className="mt-6 p-8 border" style={{background:'linear-gradient(135deg, var(--cream-deep), var(--cream))', borderColor:'var(--line)'}}>
      <div className="flex justify-between items-start gap-4 flex-wrap mb-4">
        <div>
          <div className="text-[10px] tracking-[0.3em] uppercase" style={{color:'var(--ink-soft)'}}>Visual Analysis</div>
          <h3 className="font-serif text-2xl italic mt-1" style={{color:'var(--ink)'}}>What changed?</h3>
        </div>
        {!analysis && (
          <button onClick={analyze} disabled={loading} className="text-[10px] tracking-[0.2em] uppercase border px-4 py-2 disabled:opacity-50 flex items-center gap-2" style={{borderColor:'var(--ink)', color:'var(--ink)'}}>
            {loading ? <><Icon name="Loader2" size={11} className="spin" /> Analyzing</> : <><Icon name="Sparkles" size={11} /> Compare with AI</>}
          </button>
        )}
      </div>
      {!analysis && !loading && <p className="text-sm font-light italic" style={{color:'var(--ink-soft)'}}>{(a.photo && b.photo) ? 'Both entries have photos — the AI will describe visible differences.' : 'AI will analyze the rating, concerns, and routine changes between these entries.'}</p>}
      {analysis && <div className="text-sm leading-relaxed font-light whitespace-pre-wrap" style={{color:'var(--ink)'}}>{analysis}</div>}
    </div>
  );
};

const PhotoTimeline = ({ logs, setActiveTab }) => {

  const byMonth = {};
  filtered.forEach(l => {

    if (!byMonth[key]) byMonth[key] = [];

    <div>

                  <h2 className="font-serif text-3xl italic" style={{color:'var(--ink)'}}>{month}</h2>

const RoutineBuilder = ({ products, callClaude, setShowApiKeyModal, setShowProductModal, toast }) => {
  const [routine, setRoutine] = useState(null);
  const [loading, setLoading] = useState(false);
  const activeProducts = products.filter(p => !p.endDate);

  const generateRoutine = async () => {
    if (!getApiKey()) { setShowApiKeyModal(true); return; }
    if (activeProducts.length === 0) { toast('Add some products first', 'error'); return; }
    setLoading(true);
    try {
      const productList = activeProducts.map(p => `${p.name} (${p.activeIngredients || 'unknown actives'}) - ${p.category} - ${p.frequency}`).join('\n');
      const prompt = `Build an optimal AM and PM skincare routine using ONLY these products the user owns:

${productList}

Order them following dermatological best practices: thinnest to thickest, water-based before oil-based, treatments after cleansing, sunscreen always last in AM. Account for ingredient interactions (e.g., Vit C in AM, retinoids in PM, alternate exfoliants).

Format response as:

AM ROUTINE:
1. [Product name] — [why this step, brief evidence-based reason]
2. ...

PM ROUTINE:
1. [Product name] — [reason]
2. ...

LAYERING NOTES:
[2-3 sentences about pH, wait times between steps, frequency rotations]

GAPS DETECTED:
[Critical missing pieces in the routine — e.g., "No SPF logged. A broad-spectrum SPF 30+ is essential for any AM routine." If the routine is complete, write "Routine appears complete."]`;
      const result = await callClaude(prompt);
      setRoutine(result);
      toast('Routine optimized ✨');
    } catch (e) {
      toast('Unable to build routine', 'error');
    }
    setLoading(false);
  };

  // Parse sections
  const parseSection = (header) => {
    if (!routine) return null;
    const headers = ['AM ROUTINE', 'PM ROUTINE', 'LAYERING NOTES', 'GAPS DETECTED'];
    const idx = headers.indexOf(header);
    const next = headers.slice(idx + 1).join('|');
    const regex = next ? new RegExp(`${header}:\\s*([\\s\\S]*?)(?=(${next}):)`, 'i') : new RegExp(`${header}:\\s*([\\s\\S]*)`, 'i');
    const match = routine.match(regex);
    return match ? match[1].trim() : null;
  };

  return (
    <div>
      <SectionHeader title="The Routine" subtitle="Optimally ordered, dermatologist-approved." />

      {activeProducts.length === 0 ? (
        <EmptyState icon="Layers" text="Add active products to build your routine." action={() => setShowProductModal(true)} actionText="Add Product" />
      ) : (
        <>
          <div className="flex justify-between items-center flex-wrap gap-4 mb-8">
            <div className="text-sm font-light italic" style={{color:'var(--ink-soft)'}}>
              {activeProducts.length} active products in your routine
            </div>
            <button onClick={generateRoutine} disabled={loading} className="px-6 py-3 tracking-[0.2em] text-[10px] uppercase transition flex items-center gap-2" style={{background:'var(--ink)', color:'var(--cream)'}}>
              {loading ? <><Icon name="Loader2" size={12} className="spin" /> Building</> : <><Icon name="Sparkles" size={12} /> {routine ? 'Rebuild Routine' : 'Build Optimal Routine'}</>}
            </button>
          </div>

          {!routine && !loading && (
            <div className="grid md:grid-cols-2 gap-6">
              <div className="border p-8" style={{background:'var(--cream-deep)', borderColor:'var(--line)'}}>
                <div className="flex items-center gap-2 mb-3">
                  <Icon name="Sun" size={16} />
                  <h3 className="font-serif text-2xl italic" style={{color:'var(--ink)'}}>Morning</h3>
                </div>
                <p className="text-sm font-light italic" style={{color:'var(--ink-soft)'}}>Tap "Build Optimal Routine" to order your products for AM.</p>
              </div>
              <div className="border p-8" style={{background:'var(--cream-deep)', borderColor:'var(--line)'}}>
                <div className="flex items-center gap-2 mb-3">
                  <Icon name="Moon" size={16} />
                  <h3 className="font-serif text-2xl italic" style={{color:'var(--ink)'}}>Evening</h3>
                </div>
                <p className="text-sm font-light italic" style={{color:'var(--ink-soft)'}}>Your evening order will appear here.</p>
              </div>
            </div>
          )}

          {routine && (
            <>
              <div className="grid md:grid-cols-2 gap-6 mb-8">
                <div className="border p-8" style={{background:'linear-gradient(135deg, #f5e8d4, var(--cream-deep))', borderColor:'var(--line)'}}>
                  <div className="flex items-center gap-2 mb-4">
                    <Icon name="Sun" size={18} />
                    <h3 className="font-serif text-2xl italic" style={{color:'var(--ink)'}}>Morning Ritual</h3>
                  </div>
                  <div className="text-sm leading-relaxed font-light whitespace-pre-wrap" style={{color:'var(--ink)'}}>{parseSection('AM ROUTINE') || 'Not generated yet.'}</div>
                </div>
                <div className="border p-8" style={{background:'linear-gradient(135deg, var(--cream-deep), #d8d0c0)', borderColor:'var(--line)'}}>
                  <div className="flex items-center gap-2 mb-4">

                    <h3 className="font-serif text-2xl italic" style={{color:'var(--ink)'}}>Evening Ritual</h3>

const CycleTracker = ({ cycleData, setCycleData, saveData, logs, toast }) => {
  const [showAdd, setShowAdd] = useState(false);
  const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);

  const addPeriod = async () => {
    if (!newDate) return;
    const updated = { ...cycleData, periods: [...(cycleData.periods || []), { date: newDate, id: Date.now() }].sort((a,b) => new Date(b.date) - new Date(a.date)) };
    setCycleData(updated);
    await saveData('cycle', updated);
    setShowAdd(false);
    toast('Period start logged');
  };

  const removePeriod = async (id) => {
    const updated = { ...cycleData, periods: cycleData.periods.filter(p => p.id !== id) };
    setCycleData(updated);
    await saveData('cycle', updated);
  };

  // Predict next period
  const periods = cycleData.periods || [];
  const lastPeriod = periods[0];
  const cycleLen = cycleData.cycleLength || 28;
  const nextPredicted = lastPeriod ? new Date(new Date(lastPeriod.date).getTime() + cycleLen * 24*60*60*1000) : null;
  const today = new Date();
  const dayOfCycle = lastPeriod ? Math.floor((today - new Date(lastPeriod.date)) / (1000*60*60*24)) + 1 : null;
  const phase = dayOfCycle ? (
    dayOfCycle <= 5 ? { name: 'Menstrual', desc: 'Skin can feel drier and more sensitive. Focus on hydration.' } :
    dayOfCycle <= 13 ? { name: 'Follicular', desc: 'Estrogen rising — skin tends to look its best. Good time for actives.' } :
    dayOfCycle <= 16 ? { name: 'Ovulatory', desc: 'Peak glow phase. Estrogen at its highest.' } :
    dayOfCycle <= cycleLen ? { name: 'Luteal', desc: 'Progesterone rises — oil production increases. Hormonal breakouts common, especially around the chin.' } :
    { name: 'Cycle delayed', desc: 'You may want to log a new period start.' }
  ) : null;

  // Correlate skin scores with cycle days
  const correlationData = lastPeriod ? logs.filter(l => {
    const logDate = new Date(l.date);
    return logDate >= new Date(lastPeriod.date) && logDate <= today;
  }).map(l => ({
    day: Math.floor((new Date(l.date) - new Date(lastPeriod.date)) / (1000*60*60*24)) + 1,
    rating: +l.rating,
    concerns: l.concerns || []
  })) : [];

  return (
    <div>
      <SectionHeader title="The Cycle" subtitle="Track how your hormones affect your skin." action={() => setShowAdd(true)} actionLabel="Log Period Start" />

      {periods.length === 0 ? (
        <EmptyState icon="Moon" text="Log a period start to begin tracking cycle-skin correlations." action={() => setShowAdd(true)} actionText="Log First Period" />
      ) : (
        <>
          {/* Current Phase Card */}
          {phase && (
            <div className="border p-8 mb-8" style={{background:'linear-gradient(135deg, var(--cream-deep), #f0e0e8)', borderColor:'var(--line)'}}>
              <div className="flex items-start justify-between gap-4 flex-wrap">
                <div>
                  <div className="text-[10px] tracking-[0.3em] uppercase" style={{color:'var(--ink-soft)'}}>Day {dayOfCycle} of {cycleLen}</div>
                  <h3 className="font-serif text-3xl italic mt-1" style={{color:'var(--ink)'}}>{phase.name} Phase</h3>
                  <p className="text-sm font-light italic mt-2 max-w-md" style={{color:'var(--ink-soft)'}}>{phase.desc}</p>
                </div>
                {nextPredicted && (
                  <div className="text-right">
                    <div className="text-[10px] tracking-[0.2em] uppercase" style={{color:'var(--ink-soft)'}}>Next Period</div>
                    <div className="font-serif text-2xl italic mt-1" style={{color:'var(--ink)'}}>~ {nextPredicted.toLocaleDateString('en-US', { month:'short', day:'numeric' })}</div>
                    <div className="text-xs font-light mt-1" style={{color:'var(--ink-soft)'}}>{Math.ceil((nextPredicted - today) / (1000*60*60*24))} days away</div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Correlation chart */}
          {correlationData.length >= 3 && (
            <div className="border p-6 mb-8" style={{background:'var(--cream-deep)', borderColor:'var(--line)'}}>
              <h3 className="font-serif text-xl italic mb-4" style={{color:'var(--ink)'}}>Skin scores this cycle</h3>
              <div className="relative h-32 flex items-end gap-1">
                {Array.from({length: cycleLen}, (_, i) => {
                  const day = i + 1;
                  const dataPoint = correlationData.find(d => d.day === day);
                  const height = dataPoint ? (dataPoint.rating / 10) * 100 : 0;
                  return (
                    <div key={day} className="flex-1 flex flex-col items-center justify-end" style={{height: '100%'}}>
                      {dataPoint && (
                        <div className="w-full transition" style={{
                          height: `${height}%`,
                          background: dataPoint.rating >= 7 ? 'var(--sage)' : dataPoint.rating >= 5 ? '#c9a094' : '#a04555',
                          borderRadius: '2px 2px 0 0'
                        }} title={`Day ${day}: ${dataPoint.rating}/10`}></div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="flex justify-between text-[9px] tracking-[0.15em] uppercase mt-2" style={{color:'var(--ink-soft)'}}>
                <span>Day 1</span><span>Day {Math.floor(cycleLen/2)}</span><span>Day {cycleLen}</span>
              </div>
            </div>
          )}

          {/* Cycle length setting */}
          <div className="border p-5 mb-8 flex items-center gap-4 flex-wrap" style={{background:'var(--cream-deep)', borderColor:'var(--line)'}}>
            <span className="text-[10px] tracking-[0.2em] uppercase" style={{color:'var(--ink-soft)'}}>Cycle Length</span>
            <input type="number" min="20" max="40" value={cycleLen} onChange={async e => {
              const updated = { ...cycleData, cycleLength: +e.target.value };
              setCycleData(updated);
              await saveData('cycle', updated);
            }} className="w-20 px-3 py-1.5 border text-sm font-light" />
            <span className="text-xs font-light italic" style={{color:'var(--ink-soft)'}}>days (default 28)</span>
          </div>

          {/* Period History */}
          <h3 className="font-serif text-2xl italic mb-4" style={{color:'var(--ink)'}}>Period History</h3>
          <div className="space-y-2">
            {periods.map((p, i) => {
              const next = periods[i + 1];
              const cycleLenActual = next ? Math.floor((new Date(p.date) - new Date(next.date)) / (1000*60*60*24)) : null;
              return (
                <div key={p.id} className="flex justify-between items-center p-4 border" style={{background:'var(--cream-deep)', borderColor:'var(--line)'}}>
                  <div>
                    <div className="font-serif italic text-lg" style={{color:'var(--ink)'}}>{new Date(p.date).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })}</div>
                    {cycleLenActual && <div className="text-xs font-light mt-0.5" style={{color:'var(--ink-soft)'}}>{cycleLenActual} days from previous</div>}
                  </div>
                  <button onClick={() => removePeriod(p.id)} style={{color:'var(--ink-soft)'}}><Icon name="Trash2" size={14} /></button>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Add Period Modal */}
      {showAdd && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(28,25,23,0.5)', backdropFilter:'blur(4px)'}} onClick={() => setShowAdd(false)}>
          <div onClick={e => e.stopPropagation()} className="rounded-lg max-w-sm w-full p-6 shadow-2xl" style={{background:'var(--cream)'}}>
            <h2 className="font-serif text-xl italic mb-4" style={{color:'var(--ink)'}}>Log Period Start</h2>
            <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full px-3 py-2.5 border rounded-md text-sm font-light mb-4" />
            <div className="flex gap-2">
              <button onClick={() => setShowAdd(false)} className="flex-1 py-3 tracking-widest text-xs uppercase border" style={{borderColor:'var(--line)', color:'var(--ink-soft)'}}>Cancel</button>
              <button onClick={addPeriod} className="flex-1 py-3 tracking-widest text-xs uppercase" style={{background:'var(--ink)', color:'var(--cream)'}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const TodayReminder = ({ logs, products, procedures, events, cycleData, setActiveTab, setShowLogModal }) => {
  // Build context-aware reminder list
  const reminders = [];
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  // 1. Cycle-aware tip
  const lastPeriod = cycleData?.periods?.[0];
  if (lastPeriod) {
    const day = Math.floor((today - new Date(lastPeriod.date)) / (1000*60*60*24)) + 1;
    const len = cycleData.cycleLength || 28;
    if (day >= len - 5 && day <= len) {
      reminders.push({ icon: 'Moon', title: 'Approaching luteal-end', text: 'Hormonal breakouts are most likely now, especially around the chin. A salicylic acid spot treatment can help if needed.' });
    } else if (day >= 7 && day <= 14) {
      reminders.push({ icon: 'Sparkles', title: 'Follicular phase advantage', text: 'Estrogen is rising — your skin tolerates actives best now. Good window for retinoid increases or chemical exfoliation.' });
    }
  }

  // 2. Procedure follow-up — last procedure was >25 days ago and was a series-type
  const lastProc = procedures[0];
  if (lastProc) {
    const days = Math.floor((today - new Date(lastProc.date)) / (1000*60*60*24));
    const seriesProc = ['microneedling', 'laser', 'rf', 'chemical-peel'].includes(lastProc.type);
    if (seriesProc && days >= 25 && days <= 45) {
      reminders.push({ icon: 'Activity', title: `${days} days since ${lastProc.name}`, text: `For best results with ${lastProc.type.replace(/-/g, ' ')}, follow-up sessions are typically every 4–6 weeks. Consider scheduling round 2.`, action: () => setActiveTab('procedures') });
    }
  }

  // 3. Upcoming event prep
  const upcomingEvent = events.filter(e => new Date(e.date) > today).sort((a,b) => new Date(a.date) - new Date(b.date))[0];
  if (upcomingEvent) {
    const days = Math.ceil((new Date(upcomingEvent.date) - today) / (1000*60*60*24));
    if (days <= 14 && days >= 0) {
      reminders.push({ icon: 'Star', title: `${upcomingEvent.name} in ${days} days`, text: days <= 3 ? 'Stop all actives, focus on hydration. Your prep plan has more details.' : days <= 7 ? 'Time to taper actives if you haven\'t. Avoid new products.' : 'Maintain your routine, no big changes.', action: () => setActiveTab('events') });
    }
  }

  // 4. Sun protection reminder (if no SPF logged in active products)
  const hasSPF = products.some(p => !p.endDate && (p.category === 'sunscreen' || p.activeIngredients?.toLowerCase().match(/spf|zinc oxide|titanium|avobenzone/)));
  if (!hasSPF && products.filter(p => !p.endDate).length > 0) {
    reminders.push({ icon: 'Sun', title: 'No sunscreen in your routine', text: 'Daily broad-spectrum SPF 30+ is the single most important step for preventing skin aging and hyperpigmentation. Add one to your shelf.', action: () => setActiveTab('products') });
  }

  // 5. Consistency: if avg rating dropped below 5 in last 3 entries
  const last3 = logs.slice(0, 3);
  if (last3.length === 3 && last3.every(l => l.rating <= 4)) {
    reminders.push({ icon: 'AlertCircle', title: 'Three rough days in a row', text: 'Worth pausing actives for a few days and focusing on barrier repair — bland moisturizer, ceramides, no exfoliants.', action: () => setActiveTab('insights') });
  }

  // 6. New product feedback prompt — if a product was added in last 14 days
  const recentProduct = products.find(p => {
    const age = (today - new Date(p.startDate)) / (1000*60*60*24);
    return age >= 10 && age <= 21 && !p.endDate;
  });
  if (recentProduct && reminders.length < 3) {
    reminders.push({ icon: 'Package', title: `How is ${recentProduct.name} doing?`, text: `It's been about 2 weeks since you started — typically when initial reactions settle. Worth a journal entry to note any changes.`, action: () => setShowLogModal(true) });
  }

  if (reminders.length === 0) return null;

  // Show top 1-2 reminders to keep dashboard clean
  return (
    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
      {reminders.slice(0, 2).map((r, i) => (
        <div key={i} className="border p-5 flex gap-4 items-start" style={{background:'var(--cream-deep)', borderColor:'var(--line)'}}>
          <div className="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style={{background:'var(--cream)', color:'var(--ink)'}}>
            <Icon name={r.icon} size={14} />
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-[10px] tracking-[0.2em] uppercase" style={{color:'var(--ink-soft)'}}>For today</div>
            <div className="font-serif italic text-lg mt-0.5" style={{color:'var(--ink)'}}>{r.title}</div>
            <p className="text-xs font-light leading-relaxed mt-1" style={{color:'var(--ink-soft)'}}>{r.text}</p>
            {r.action && (
              <button onClick={r.action} className="mt-2 text-[10px] tracking-[0.15em] uppercase italic" style={{color:'var(--ink)'}}>
                Open →
              </button>
            )}
          </div>
        </div>
      ))}
    </div>
  );
};

  let remaining = analysis;
  headers.forEach((h, i) => {
    const regex = new RegExp(`${h}:\\s*([\\s\\S]*?)(?=(${headers.slice(i+1).join('|')}):|$)`, 'i');

    try {
      const ctx = `Recent skin: ${logs.slice(0, 15).map(l => `${l.date} ${l.area} ${l.rating}/10 [${l.concerns?.join(',') || ''}]`).join('; ')}\nPast procedures: ${procedures.map(p => p.name).join(', ') || 'none'}`;
      const r = await callClaude(`${ctx}\n\nBased on this user's tracked skin patterns and concerns, recommend 3-4 evidence-based in-office procedures or treatments that could benefit them. For each, explain mechanism, ideal candidates, expected results, downtime, and rough cost range. Be specific and only recommend procedures with strong clinical evidence.`);
      setRecs(r);
    } catch (e) { if (!e.message.includes('API key')) setRecs('Unable to load recommendations.'); }
    setLoading(false);
  };
  return (
    <div className="border p-6 mb-8" style={{background:'linear-gradient(135deg, var(--cream-deep), var(--cream))', borderColor:'var(--line)'}}>
      <div className="flex justify-between items-start gap-4 flex-wrap">
        <div>
          <div className="text-[10px] tracking-[0.2em] uppercase" style={{color:'var(--ink-soft)'}}>Curated for you</div>
          <h3 className="font-serif text-xl italic mt-1" style={{color:'var(--ink)'}}>Recommended Procedures</h3>
          <p className="text-xs font-light mt-1" style={{color:'var(--ink-soft)'}}>Based on your tracked patterns and concerns.</p>
        </div>
        {!recs && (
          <button onClick={fetchRecs} disabled={loading} className="text-[10px] tracking-[0.2em] uppercase border px-4 py-2 transition disabled:opacity-50 flex items-center gap-2" style={{borderColor:'var(--ink)', color:'var(--ink)'}}>
            {loading ? <><Icon name="Loader2" size={11} className="spin" /> Curating</> : <><Icon name="Sparkles" size={11} /> Get Recommendations</>}
          </button>
        )}
      </div>
      {recs && <div className="mt-4 pt-4 border-t text-sm whitespace-pre-wrap leading-relaxed font-light" style={{borderColor:'var(--line)', color:'var(--ink)'}}>{recs}</div>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
